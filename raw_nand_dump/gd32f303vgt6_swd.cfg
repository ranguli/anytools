# GD32F303VGT6
#
# This uses OpenOCD's STM32F1 target because the GD32F303 is close enough for
# Cortex-M attach and normal memory reads. Treat flash erase/program operations
# as a separate, deliberate step; do not assume the STM32 flash driver is safe
# for writes until a restore path has been proven.

source [find interface/cmsis-dap.cfg]
transport select swd

set CHIPNAME gd32f303
set WORKAREASIZE 0x8000
set FLASH_SIZE 0x100000

source [find target/stm32f1x.cfg]

adapter speed 1000
